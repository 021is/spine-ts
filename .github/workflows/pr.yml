name: PR

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# No push to main — branch protection enforces it. This workflow runs on PR
# and again on the merged main commit to populate the badge cache.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 3-way parallel split: lint + typecheck + test all run concurrently.
  # CI wall-clock = max(lint, typecheck, test) instead of sum.

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    runs-on: ubuntu-latest
    # Tests need Docker for Testcontainers
    services: {}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # Vitest emits GitHub Actions annotations on every test (✓ / ✗ inline in PR)
      - run: bun run test
        env:
          NODE_ENV: test

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
